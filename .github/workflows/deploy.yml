name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lgtm-cloudflare-pages-production
  cancel-in-progress: true

env:
  CLOUDFLARE_PAGES_PROJECT: lgtm
  CLOUDFLARE_PAGES_DOMAIN: lgtm.prestidge.dev

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: game

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Build
        run: bun run build

      - name: Ensure Cloudflare Pages project
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          response_file="$(mktemp)"
          status="$(curl --silent --show-error --output "$response_file" --write-out "%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT}" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")"

          if [[ "$status" == "404" ]]; then
            curl --fail-with-body --silent --show-error \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
              --request POST \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "{\"name\":\"${CLOUDFLARE_PAGES_PROJECT}\",\"production_branch\":\"main\"}"
          elif [[ "$status" != "200" ]]; then
            cat "$response_file"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }} --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: game

      - name: Ensure production domain
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          response_file="$(mktemp)"
          status="$(curl --silent --show-error --output "$response_file" --write-out "%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT}/domains/${CLOUDFLARE_PAGES_DOMAIN}" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")"

          if [[ "$status" == "404" ]]; then
            curl --fail-with-body --silent --show-error \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT}/domains" \
              --request POST \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "{\"name\":\"${CLOUDFLARE_PAGES_DOMAIN}\"}"
          elif [[ "$status" != "200" ]]; then
            cat "$response_file"
            exit 1
          fi
